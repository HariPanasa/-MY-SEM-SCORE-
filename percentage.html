<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percentage Converter – MY SEM SCORE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .dark .glass { background: rgba(31, 41, 55, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300 flex flex-col min-h-screen">

  <!-- Navbar -->
  <nav class="fixed w-full z-50 glass shadow-sm transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex-shrink-0 flex items-center">
          <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-600 to-indigo-600 dark:from-brand-400 dark:to-indigo-400">
            📊 MY SEM SCORE
          </a>
        </div>
        <div class="hidden md:flex space-x-8 items-center">
          <a href="index.html" class="nav-link text-gray-600 hover:text-brand-600 dark:text-gray-300 dark:hover:text-brand-400 font-medium transition">Home</a>
          <a href="sgpa.html" class="nav-link text-gray-600 hover:text-brand-600 dark:text-gray-300 dark:hover:text-brand-400 font-medium transition">SGPA</a>
          <a href="cgpa.html" class="nav-link text-gray-600 hover:text-brand-600 dark:text-gray-300 dark:hover:text-brand-400 font-medium transition">CGPA</a>
          <a href="percentage.html" class="nav-link text-gray-600 hover:text-brand-600 dark:text-gray-300 dark:hover:text-brand-400 font-medium transition">Percentage</a>
          <a href="about.html" class="nav-link text-gray-600 hover:text-brand-600 dark:text-gray-300 dark:hover:text-brand-400 font-medium transition">About</a>
          <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition ml-4">
            <svg id="themeIconDark" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            <svg id="themeIconLight" class="hidden w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 1.336a1 1 0 011.415 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-1.336 4.22a1 1 0 010 1.415l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-1.336a1 1 0 010-1.415l-.707-.707a1 1 0 011.414-1.414l.707.707a1 1 0 01-1.414 1.414zM4 10a1 1 0 01-1 1H2a1 1 0 110-2h1a1 1 0 011 1zm1.336-4.22a1 1 0 011.415 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM10 5a5 5 0 100 10 5 5 0 000-10z" clip-rule="evenodd"></path></svg>
          </button>
        </div>
        <div class="md:hidden flex items-center gap-4">
          <button id="themeToggleMobile" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800" onclick="document.getElementById('themeToggle').click()">🌓</button>
          <button id="mobileMenuBtn" class="p-2 text-gray-600 dark:text-gray-300">
             <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
          </button>
        </div>
      </div>
    </div>
    <div id="mobileMenu" class="hidden md:hidden bg-white dark:bg-gray-800 border-t dark:border-gray-700">
      <div class="px-4 pt-2 pb-4 space-y-1">
        <a href="index.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-200 hover:text-brand-600 dark:hover:text-brand-400">Home</a>
        <a href="sgpa.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-200 hover:text-brand-600 dark:hover:text-brand-400">SGPA Calculator</a>
        <a href="cgpa.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-200 hover:text-brand-600 dark:hover:text-brand-400">CGPA Calculator</a>
        <a href="percentage.html" class="block px-3 py-2 rounded-md text-base font-medium text-brand-600 dark:text-brand-400">Percentage Converter</a>
        <a href="about.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-200 hover:text-brand-600 dark:hover:text-brand-400">About</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full flex flex-col justify-center items-center">
    <div class="text-center mb-10">
      <h2 class="text-3xl font-bold">Percentage Converter</h2>
      <p class="text-gray-500 mt-2">Instantly convert your CGPA or SGPA to a percentage.</p>
    </div>

    <div class="glass rounded-3xl p-8 md:p-12 shadow-sm w-full max-w-lg relative overflow-hidden">
      <!-- Decorative background glow -->
      <div class="absolute -top-10 -right-10 w-40 h-40 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
      <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-brand-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style="animation-delay: 2s;"></div>
      
      <div class="relative z-10">
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3 text-center">Enter your CGPA (or SGPA)</label>
        <div class="relative max-w-xs mx-auto mb-8">
          <input type="number" step="0.01" min="0" max="10" id="cgpa-input" placeholder="e.g. 8.5" oninput="calculatePercentage()" class="w-full text-center text-3xl font-bold p-4 rounded-xl border-2 border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 focus:border-pink-500 dark:focus:border-pink-500 focus:ring-0 outline-none transition shadow-inner text-gray-800 dark:text-white" />
        </div>

        <div class="bg-gradient-to-br from-pink-50 to-red-50 dark:from-gray-800 dark:to-gray-800 p-8 rounded-2xl border border-pink-100 dark:border-gray-700 text-center shadow-md">
          <p class="text-gray-500 dark:text-gray-400 font-medium mb-2 uppercase tracking-wide text-sm">Equivalent Percentage</p>
          <p class="text-6xl font-extrabold text-pink-600 dark:text-pink-400 drop-shadow-sm"><span id="percentage-result">0.00</span>%</p>
          
          <div class="mt-6 flex justify-center">
             <button onclick="copyPercentage()" class="bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-pink-600 dark:text-pink-400 border border-pink-200 dark:border-gray-600 px-6 py-2 rounded-lg font-medium transition flex items-center gap-2 shadow-sm">
               📋 Copy Percentage
             </button>
          </div>
        </div>
        
        <div class="mt-6 text-center">
          <p class="text-xs text-gray-400 dark:text-gray-500 font-medium">Standard Formula: (CGPA - 0.75) × 10</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 py-8 text-center text-sm text-gray-500 dark:text-gray-400 mt-auto">
    <div class="max-w-7xl mx-auto px-4">
      <p>© 2025 MY SEM SCORE. Made with ❤️.</p>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    function calculatePercentage() {
      const input = document.getElementById('cgpa-input');
      const val = parseFloat(input.value);
      const resultSpan = document.getElementById('percentage-result');
      
      if (isNaN(val)) {
        resultSpan.textContent = '0.00';
        return;
      }
      if (val < 0 || val > 10) {
        // Handle invalid gracefully without alerts on every keystroke
        resultSpan.textContent = '0.00';
        return;
      }

      const percentage = Math.max(0, ((val - 0.75) * 10)).toFixed(2);
      resultSpan.textContent = percentage;
    }

    function copyPercentage() {
      const percentage = document.getElementById('percentage-result').textContent;
      if (percentage === '0.00' && document.getElementById('cgpa-input').value === '') {
        showToast("Please enter a CGPA first.", "error");
        return;
      }
      const cgpa = document.getElementById('cgpa-input').value;
      const text = `My Academic Score:\nCGPA: ${cgpa}\nPercentage: ${percentage}%\nCalculated via MY SEM SCORE!`;
      copyToClipboard(text);
    }
  </script>
</body>
</html>
